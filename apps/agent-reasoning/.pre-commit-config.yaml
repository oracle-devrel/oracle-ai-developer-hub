repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/astral-sh/ty
    rev: 0.1.0
    hooks:
      - id: ty

  - repo: https://github.com/astral-sh/prek
    rev: 1.0.0
    hooks:
      - id: prek
        args: [--all-files]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        always_run: true
