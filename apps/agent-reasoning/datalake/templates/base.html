<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title | default("Datalake") }} - Reasoning Datalake</title>
    <style>
        /* ================================================================
           Reasoning Datalake — Deep Blue / Slate Theme
           ================================================================ */

        :root {
            --bg-primary:    #0f172a;   /* slate-900 */
            --bg-secondary:  #1e293b;   /* slate-800 */
            --bg-tertiary:   #334155;   /* slate-700 */
            --bg-card:       #1e293b;
            --bg-hover:      #273548;
            --border:        #475569;   /* slate-600 */
            --border-light:  #334155;
            --text-primary:  #f1f5f9;   /* slate-100 */
            --text-secondary:#94a3b8;   /* slate-400 */
            --text-muted:    #64748b;   /* slate-500 */
            --accent-blue:   #3b82f6;
            --accent-cyan:   #06b6d4;
            --accent-green:  #22c55e;
            --accent-amber:  #f59e0b;
            --accent-red:    #ef4444;
            --accent-violet: #8b5cf6;
            --accent-pink:   #ec4899;
            --accent-indigo: #6366f1;
            --font-mono:     'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            --font-sans:     'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --sidebar-width: 240px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
        }

        /* ---- Sidebar ---- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px 20px 16px;
            border-bottom: 1px solid var(--border-light);
        }

        .sidebar-header h1 {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent-cyan);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .sidebar-header .subtitle {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            font-family: var(--font-mono);
        }

        .sidebar-nav {
            flex: 1;
            padding: 12px 0;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.15s ease;
            border-left: 3px solid transparent;
        }

        .sidebar-nav a:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        .sidebar-nav a.active {
            color: var(--accent-cyan);
            background: rgba(6, 182, 212, 0.08);
            border-left-color: var(--accent-cyan);
        }

        .sidebar-nav .nav-icon {
            width: 18px;
            text-align: center;
            font-size: 15px;
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-light);
            font-size: 11px;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        /* ---- Main Content ---- */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .page-header {
            padding: 24px 32px 16px;
            border-bottom: 1px solid var(--border-light);
            background: var(--bg-secondary);
        }

        .page-header h2 {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .page-header .breadcrumb {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
            font-family: var(--font-mono);
        }

        .page-header .breadcrumb a {
            color: var(--accent-cyan);
            text-decoration: none;
        }

        .page-body {
            padding: 24px 32px;
            flex: 1;
        }

        /* ---- Cards ---- */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .card-header {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        /* ---- Stats Grid ---- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .stat-card .stat-value {
            font-size: 32px;
            font-weight: 700;
            font-family: var(--font-mono);
            color: var(--accent-cyan);
        }

        .stat-card .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 6px;
        }

        .stat-card.green .stat-value { color: var(--accent-green); }
        .stat-card.amber .stat-value { color: var(--accent-amber); }
        .stat-card.red .stat-value   { color: var(--accent-red); }
        .stat-card.violet .stat-value { color: var(--accent-violet); }

        /* ---- Tables ---- */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead th {
            text-align: left;
            padding: 10px 12px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border-light);
            background: var(--bg-secondary);
            position: sticky;
            top: 0;
        }

        tbody td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-light);
            color: var(--text-primary);
            vertical-align: top;
        }

        tbody tr:hover {
            background: var(--bg-hover);
        }

        .mono {
            font-family: var(--font-mono);
            font-size: 12px;
        }

        .text-muted { color: var(--text-muted); }
        .text-secondary { color: var(--text-secondary); }

        /* ---- Status Badges ---- */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .badge-completed { background: rgba(34, 197, 94, 0.15); color: var(--accent-green); }
        .badge-running   { background: rgba(245, 158, 11, 0.15); color: var(--accent-amber); }
        .badge-failed    { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); }
        .badge-cancelled { background: rgba(100, 116, 139, 0.15); color: var(--text-muted); }

        /* ---- Strategy Chips ---- */
        .strategy-chip {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            background: rgba(59, 130, 246, 0.12);
            color: var(--accent-blue);
            font-family: var(--font-mono);
        }

        /* ---- Links ---- */
        a.link {
            color: var(--accent-cyan);
            text-decoration: none;
        }

        a.link:hover {
            text-decoration: underline;
        }

        /* ---- Buttons ---- */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.15s ease;
        }

        .btn:hover {
            background: var(--border);
        }

        .btn-primary {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        /* ---- Filters ---- */
        .filter-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filter-bar select,
        .filter-bar input[type="text"] {
            padding: 7px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 13px;
            font-family: var(--font-sans);
        }

        .filter-bar select:focus,
        .filter-bar input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.2);
        }

        /* ---- JSON Block ---- */
        .json-block {
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: 6px;
            padding: 12px 16px;
            font-family: var(--font-mono);
            font-size: 12px;
            line-height: 1.5;
            color: var(--text-secondary);
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
        }

        /* ---- Timeline ---- */
        .timeline {
            position: relative;
            padding-left: 28px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border-light);
        }

        .timeline-event {
            position: relative;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 6px;
            border-left: 3px solid var(--accent-blue);
        }

        .timeline-event::before {
            content: '';
            position: absolute;
            left: -24px;
            top: 16px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent-blue);
            border: 2px solid var(--bg-primary);
        }

        .timeline-event .event-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .timeline-event .event-type {
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .timeline-event .event-seq {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-muted);
        }

        .timeline-event .event-update {
            font-size: 10px;
            color: var(--accent-amber);
            font-weight: 600;
            text-transform: uppercase;
        }

        .timeline-event .event-data {
            margin-top: 8px;
        }

        /* ---- Pagination ---- */
        .pagination {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 24px;
        }

        /* ---- Empty State ---- */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        /* ---- Utility ---- */
        .truncate {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 300px;
        }

        .flex { display: flex; }
        .gap-2 { gap: 8px; }
        .gap-4 { gap: 16px; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .mb-4 { margin-bottom: 16px; }
        .mb-6 { margin-bottom: 24px; }
        .mt-4 { margin-top: 16px; }

        /* ---- Responsive ---- */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; }
            .page-body { padding: 16px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <h1>Datalake</h1>
            <div class="subtitle">Agent Reasoning Traces</div>
        </div>
        <div class="sidebar-nav">
            <a href="/" class="{% if page_title == 'Dashboard' %}active{% endif %}">
                <span class="nav-icon">&#9632;</span> Dashboard
            </a>
            <a href="/sessions" class="{% if page_title == 'Sessions' %}active{% endif %}">
                <span class="nav-icon">&#9654;</span> Sessions
            </a>
            <a href="/stats" class="{% if page_title == 'Statistics' %}active{% endif %}">
                <span class="nav-icon">&#9650;</span> Statistics
            </a>
            <a href="/compare" class="{% if page_title == 'Compare Sessions' %}active{% endif %}">
                <span class="nav-icon">&#9646;&#9646;</span> Compare
            </a>
        </div>
        <div class="sidebar-footer">
            Oracle 26ai Free<br>
            v{{ version | default("0.1.0") }}
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <div class="page-header">
            <div class="breadcrumb">
                <a href="/">datalake</a> / {{ page_title | default("") | lower }}
            </div>
            <h2>{{ page_title | default("Reasoning Datalake") }}</h2>
        </div>
        <div class="page-body">
            {% block content %}{% endblock %}
        </div>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
