services:
  oracle-free:
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle-free
    environment:
      ORACLE_PWD: mypw
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "/opt/oracle/checkDBStatus.sh"]
      interval: 15s
      timeout: 5s
      retries: 40

volumes:
  oracle-data:
