services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: oracle-free
    environment:
      ORACLE_PASSWORD: OraclePwd_2025
      APP_USER: VECTOR
      APP_USER_PASSWORD: VectorPwd_2025
    ports:
      - "1521:1521"
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 120s
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./oracle-init:/container-entrypoint-initdb.d

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.18.0
    container_name: agent-memory-jaeger
    profiles:
      - observability
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP

volumes:
  oracle-data:
